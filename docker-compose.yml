version: '3.8'

services:
  # PostgreSQL - Master Database
  postgres:
    image: postgres:15-alpine
    container_name: viz-ai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viz_ai_master
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caching & Session Store
  redis:
    image: redis:7-alpine
    container_name: viz-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: viz-ai-backend
    environment:
      DATABASE_URL_MASTER: ${DATABASE_URL_MASTER:-postgresql://postgres:postgres@postgres:5432/viz_ai_master}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev
    networks:
      - viz-network

  # Python AI Layer
  ai-layer:
    build:
      context: ./ai-layer
      dockerfile: Dockerfile
    container_name: viz-ai-layer
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      WHISPER_API_KEY: ${WHISPER_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - backend
    volumes:
      - ./ai-layer/src:/app/src
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - viz-network

volumes:
  postgres_data:
  redis_data:

networks:
  viz-network:
    driver: bridge
